<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting to Markdown Studio</title>
    <meta http-equiv="refresh" content="0; url=./" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0f172a;
        color: #e2e8f0;
        font: 500 16px/1.6 Inter, ui-sans-serif, system-ui, sans-serif;
      }
      .card {
        width: min(92vw, 520px);
        padding: 28px;
        border-radius: 24px;
        background: rgba(15, 23, 42, 0.82);
        border: 1px solid rgba(148, 163, 184, 0.2);
        box-shadow: 0 30px 80px rgba(2, 6, 23, 0.35);
      }
      a {
        color: #7dd3fc;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Opening Markdown Studio…</h1>
      <p>If you are not redirected automatically, <a href="./">open the app root</a>.</p>
    </div>
    <script>
      (function () {
        var path = window.location.pathname.split('/').filter(Boolean);
        var target = './';
        if (/github\.io$/i.test(window.location.hostname)) {
          if (path.length > 1) {
            target = '/' + path[0] + '/';
          } else {
            target = '/';
          }
        }
        window.location.replace(target);
      })();
    </script>
  </body>
</html>
